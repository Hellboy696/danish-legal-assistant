# Danish Legal Assistant V2 — Production Docker Compose
# Usage:
#   cp backend/.env.example backend/.env
#   docker compose up -d

services:
  redis:
    image: redis:7-alpine
    container_name: danish_legal_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: danish_legal_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=["http://localhost","http://localhost:80","http://frontend","http://localhost:5173"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - lancedb_data:/app/database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: danish_legal_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  lancedb_data:
    driver: local
