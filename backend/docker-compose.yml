version: "3.9"

services:
  backend:
    build:
      # Build context is the repo root so COPY data/ and COPY database/ resolve correctly
      context: ..
      dockerfile: backend/Dockerfile
    container_name: danish_legal_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s  # allow time for model loading on cold start

  frontend:
    image: node:20-alpine
    container_name: danish_legal_frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
